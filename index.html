<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>For Shay ❤️</title>
    <style>
        body {
            background: linear-gradient(to bottom right, #f9d5e5, #ffe3e3);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #6b1e4a;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            max-width: 600px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.5em;
            line-height: 1.8;
        }

        .heart {
            color: #e91e63;
            font-size: 2em;
            animation: beat 1s infinite;
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Shay ❤️</h1>
        <p>I'm all, I'm really all in.<br>
        I fell in love with all your flaws and sins.<br>
        Your scars are really gorgeous.<br>
        That's my way of giving compliments.</p>
        <div class="heart">💖</div>
    </div>
</body>
</html>
